name: Daily Job Board Update

on:
  schedule:
    # Runs everyday at 20:30 UTC (2:00 AM IST)
    - cron: '30 20 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  update-board:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Job Fetcher Script
      env:
        JOB_API_KEY: ${{ secrets.JOB_API_KEY }} # Set this in GitHub Repo Secrets
      run: python scripts/fetch_jobs.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add public/jobs.json
        git diff-index --quiet HEAD || git commit -m "Automated Sync: Updated jobs listing"
        git push