<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Job Hunter — Senior & Lead DevOps / Cloud Roles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .tab-active { color: #0f172a; }
    .tab-active::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
      height: 2px; background: #0f172a; border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

  <!-- Header -->
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-20">
    <div class="mx-auto max-w-5xl px-4 py-5 sm:px-6">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-xl font-extrabold tracking-tight sm:text-2xl">
            The Job Hunter
          </h1>
          <p class="mt-0.5 text-sm text-slate-500">
            Curated Senior &amp; Lead roles — DevOps, Cloud &amp; Platform Engineering
          </p>
        </div>
        <div class="hidden text-right sm:block">
          <p class="text-xs uppercase tracking-wide text-slate-400">Last updated</p>
          <p id="last-updated" class="text-sm font-medium text-slate-600">—</p>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">

    <!-- Tabs -->
    <div class="border-b border-slate-200">
      <nav class="-mb-px flex gap-6" aria-label="Job categories">
        <button
          data-tab="sri-lanka"
          class="tab relative pb-3 text-sm font-semibold text-slate-400 transition hover:text-slate-600"
        >
          🇱🇰 Sri Lanka <span class="font-normal text-slate-400">(Senior/Lead)</span>
          <span class="tab-count ml-1 rounded-full bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-500"></span>
        </button>
        <button
          data-tab="international"
          class="tab relative pb-3 text-sm font-semibold text-slate-400 transition hover:text-slate-600"
        >
          🌍 International <span class="font-normal text-slate-400">(Visa &amp; Relocation)</span>
          <span class="tab-count ml-1 rounded-full bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-500"></span>
        </button>
      </nav>
    </div>

    <!-- Controls -->
    <div class="mt-6 space-y-4">
      <!-- Search -->
      <div class="relative">
        <svg class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <input
          id="search"
          type="search"
          placeholder="Search by keyword, company, or location…"
          class="w-full rounded-xl border border-slate-200 bg-white py-3 pl-10 pr-4 text-sm shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200"
        />
      </div>

      <!-- Quick keyword chips -->
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-xs font-medium uppercase tracking-wide text-slate-400">Quick filters:</span>
        <div id="keyword-chips" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- Results meta -->
    <div class="mt-6 flex items-center justify-between">
      <p id="results-count" class="text-sm text-slate-500"></p>
      <button id="clear-filters" class="hidden text-sm font-medium text-slate-500 underline-offset-2 hover:text-slate-900 hover:underline">
        Clear filters
      </button>
    </div>

    <!-- Job list -->
    <div id="job-list" class="mt-4 space-y-3"></div>

    <!-- Empty / loading / error states -->
    <div id="state" class="mt-10 text-center"></div>

  </main>

  <footer class="mx-auto max-w-5xl px-4 py-10 text-center text-xs text-slate-400 sm:px-6">
    Built with vanilla JS + Tailwind · Data from <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-500">jobs.json</code>
  </footer>

  <script>
    const KEYWORDS = ['DevOps', 'Cloud', 'AWS', 'Azure', 'GCP', 'Kubernetes', 'Terraform', 'SRE', 'Platform', 'CI/CD'];

    const state = {
      jobs: [],
      tab: 'sri-lanka',
      search: '',
      activeKeywords: new Set(),
    };

    const el = {
      list: document.getElementById('job-list'),
      stateBox: document.getElementById('state'),
      search: document.getElementById('search'),
      chips: document.getElementById('keyword-chips'),
      count: document.getElementById('results-count'),
      clear: document.getElementById('clear-filters'),
      lastUpdated: document.getElementById('last-updated'),
      tabs: Array.from(document.querySelectorAll('.tab')),
    };

    // ---- Rendering helpers -------------------------------------------------

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function jobCard(job) {
      const tags = (job.tags || [])
        .map((t) => `<span class="rounded-md bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-600">${escapeHtml(t)}</span>`)
        .join('');

      const relocation = job.relocation
        ? `<span class="inline-flex items-center gap-1 rounded-md bg-emerald-50 px-2 py-0.5 text-xs font-semibold text-emerald-700">✈ Visa / Relocation</span>`
        : '';

      const salary = job.salary
        ? `<span class="text-sm font-medium text-slate-700">${escapeHtml(job.salary)}</span>`
        : '';

      return `
        <article class="group rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition hover:border-slate-300 hover:shadow-md">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
            <div class="min-w-0">
              <div class="flex flex-wrap items-center gap-2">
                <h3 class="text-base font-semibold text-slate-900">${escapeHtml(job.title)}</h3>
                ${relocation}
              </div>
              <p class="mt-1 text-sm text-slate-600">
                <span class="font-medium text-slate-800">${escapeHtml(job.company)}</span>
                <span class="text-slate-400"> · </span>${escapeHtml(job.location)}
              </p>
              ${tags ? `<div class="mt-3 flex flex-wrap gap-1.5">${tags}</div>` : ''}
            </div>
            <div class="flex shrink-0 flex-col items-start gap-2 sm:items-end">
              ${salary}
              <a href="${escapeHtml(job.url || '#')}" target="_blank" rel="noopener"
                 class="inline-flex items-center gap-1 rounded-lg bg-slate-900 px-3 py-1.5 text-sm font-semibold text-white transition hover:bg-slate-700">
                View role →
              </a>
            </div>
          </div>
        </article>`;
    }

    function setState(html) {
      el.stateBox.innerHTML = html;
    }

    // ---- Filtering ---------------------------------------------------------

    function filteredJobs() {
      const q = state.search.trim().toLowerCase();
      const kws = Array.from(state.activeKeywords).map((k) => k.toLowerCase());

      return state.jobs.filter((job) => {
        if (job.category !== state.tab) return false;

        const haystack = [
          job.title, job.company, job.location, job.salary,
          ...(job.tags || []),
        ].join(' ').toLowerCase();

        if (q && !haystack.includes(q)) return false;
        if (kws.length && !kws.every((k) => haystack.includes(k))) return false;
        return true;
      });
    }

    function render() {
      // tab styles + counts
      el.tabs.forEach((btn) => {
        const isActive = btn.dataset.tab === state.tab;
        btn.classList.toggle('tab-active', isActive);
        btn.classList.toggle('text-slate-400', !isActive);
        const count = state.jobs.filter((j) => j.category === btn.dataset.tab).length;
        btn.querySelector('.tab-count').textContent = count;
      });

      const results = filteredJobs();

      el.list.innerHTML = results.map(jobCard).join('');
      el.count.textContent = `${results.length} role${results.length === 1 ? '' : 's'} shown`;

      const hasFilters = state.search || state.activeKeywords.size;
      el.clear.classList.toggle('hidden', !hasFilters);

      if (!results.length) {
        setState(`
          <div class="rounded-xl border border-dashed border-slate-300 bg-white py-12">
            <p class="text-sm font-medium text-slate-600">No matching roles</p>
            <p class="mt-1 text-sm text-slate-400">Try a different keyword or clear your filters.</p>
          </div>`);
      } else {
        setState('');
      }
    }

    // ---- Keyword chips -----------------------------------------------------

    function renderChips() {
      el.chips.innerHTML = KEYWORDS.map((kw) => {
        const active = state.activeKeywords.has(kw);
        return `
          <button data-keyword="${kw}"
            class="rounded-full border px-3 py-1 text-xs font-medium transition
              ${active
                ? 'border-slate-900 bg-slate-900 text-white'
                : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'}">
            ${kw}
          </button>`;
      }).join('');
    }

    // ---- Events ------------------------------------------------------------

    el.tabs.forEach((btn) => {
      btn.addEventListener('click', () => {
        state.tab = btn.dataset.tab;
        render();
      });
    });

    el.search.addEventListener('input', (e) => {
      state.search = e.target.value;
      render();
    });

    el.chips.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-keyword]');
      if (!btn) return;
      const kw = btn.dataset.keyword;
      if (state.activeKeywords.has(kw)) {
        state.activeKeywords.delete(kw);
      } else {
        state.activeKeywords.add(kw);
      }
      renderChips();
      render();
    });

    el.clear.addEventListener('click', () => {
      state.search = '';
      state.activeKeywords.clear();
      el.search.value = '';
      renderChips();
      render();
    });

    // ---- Boot --------------------------------------------------------------

    async function init() {
      renderChips();
      setState(`<p class="text-sm text-slate-400">Loading roles…</p>`);
      try {
        const res = await fetch('jobs.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        state.jobs = Array.isArray(data) ? data : (data.jobs || []);
        if (data.updated) {
          el.lastUpdated.textContent = data.updated;
        }
        render();
      } catch (err) {
        setState(`
          <div class="rounded-xl border border-dashed border-red-200 bg-red-50 py-12">
            <p class="text-sm font-medium text-red-700">Couldn't load jobs.json</p>
            <p class="mt-1 text-sm text-red-400">${escapeHtml(err.message)}. Serve this folder over HTTP (not file://).</p>
          </div>`);
      }
    }

    init();
  </script>
</body>
</html>
